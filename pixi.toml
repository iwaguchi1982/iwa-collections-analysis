[workspace]
name = "insilico-target-finder"
version = "0.1.0"
channels = ["conda-forge"]
platforms = ["linux-64"]

[dependencies]
python = "3.12.*"
streamlit = ">=1.54.0,<2"
pandas = ">=2.3.3,<3"
plotly = "*"
scipy = "*"
requests = "*"
pyarrow = ">=23.0.1,<24" # 大規模データ高速読み込み用
lifelines = ">=0.30.1,<0.31"
statsmodels = ">=0.14.6,<0.15"
seaborn = ">=0.13.2,<0.14"
numpy = ">=2.4.2,<3"
matplotlib = ">=3.10.8,<4"
pyrefly = ">=0.54.0,<0.55"
joblib = ">=1.5.3,<2"
GEOparse = "*"

[pypi-dependencies]
gseapy = ">=1.1.12, <2"
statsmodels = "*"
